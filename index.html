<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./style.css" rel="stylesheet">
  <title>Tic Tac Toe</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="game-name"><p>Tic Tac Toe</p></div>
    </div>
    <div class="gameboard">
      <div class="top">
        <div class="upper-left left-col"></div>
        <div class="upper-middle mid-col"></div>
        <div class="upper-right right-col"></div>
      </div>
      <div class="middle">
        <div class="middle-left left-col"></div>
        <div class="middle-middle mid-col"></div>
        <div class="middle-right right-col"></div>
      </div>
      <div class="bottom">
        <div class="bottom-left left-col"></div>
        <div class="bottom-middle mid-col"></div>
        <div class="bottom-right right-col"></div>
      </div>
    </div>
    <div class="footer"></div>
  </div>
  <script src="./javascript.js" defer></script>
</body>
</html>
